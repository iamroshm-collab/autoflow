name: WhatsApp Health Check

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  whatsapp-health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      WHATSAPP_ACCESS_TOKEN: ${{ secrets.WHATSAPP_ACCESS_TOKEN }}
      META_WHATSAPP_WEBHOOK_VERIFY_TOKEN: ${{ secrets.META_WHATSAPP_WEBHOOK_VERIFY_TOKEN }}
      META_APP_ID: ${{ secrets.META_APP_ID }}
      META_APP_SECRET: ${{ secrets.META_APP_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run environment checks
        run: npm run env:check

      - name: Check Graph API token health
        shell: bash
        run: |
          if [ -z "$WHATSAPP_ACCESS_TOKEN" ]; then
            echo "WHATSAPP_ACCESS_TOKEN is missing"
            exit 1
          fi

          URL="https://graph.facebook.com/v19.0/me?access_token=${WHATSAPP_ACCESS_TOKEN}"
          HTTP_STATUS=$(curl -s -o response.json -w "%{http_code}" "$URL")

          echo "Graph API status: $HTTP_STATUS"
          cat response.json

          if [ "$HTTP_STATUS" -ne 200 ]; then
            echo "Token health check failed: expected 200 OK"
            exit 1
          fi

          echo "Token health check passed"
